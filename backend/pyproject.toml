[project]
name = "datatalk-backend"
version = "0.1.0"
description = "Datatalk V2 backend — MCP server for campaign finance data"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0.0",
    "httpx-sse>=0.4.0",
    "pydantic>=2.0",
    "uvicorn>=0.30.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
datatalk-mcp = "datatalk.mcp_server.server:main"

[tool.pytest.ini_options]
asyncio_mode = "strict"
